kind = "web"
previewPath = "/"
title = "Rym Shoes"
version = "1.0.0"
id = "artifacts/rym-shoes"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 26157

[services.development]
run = "pnpm --filter @workspace/rym-shoes run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/rym-shoes", "run", "build" ]
publicDir = "artifacts/rym-shoes/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "26157"
BASE_PATH = "/"
